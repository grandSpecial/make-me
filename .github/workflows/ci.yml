name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start server
        run: node server.js &

      - name: Verify root endpoint
        run: |
          sleep 2
          curl -fsS http://127.0.0.1:3000/ | grep -Fq "Make me."

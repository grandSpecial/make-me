name: Complete Issue On Merge

on:
  pull_request:
    types: [closed]

jobs:
  complete-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read

    steps:
      - name: Extract issue number from head branch
        id: extract
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          ISSUE_NUMBER=$(echo "$HEAD_REF" | sed -n 's#^feature/issue-\([0-9][0-9]*\)$#\1#p')
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "issue=0" >> "$GITHUB_OUTPUT"
          else
            echo "issue=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Close linked issue
        if: steps.extract.outputs.issue != '0'
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ steps.extract.outputs.issue }}
        with:
          script: |
            const issue_number = Number(process.env.ISSUE_NUMBER);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: "Feature implemented automatically. Closing this issue."
            });

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              name: "in-progress"
            }).catch(() => {});

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ["done"]
            }).catch(() => {});

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              state: "closed"
            });
